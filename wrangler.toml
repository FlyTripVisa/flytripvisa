name = "flytrip-visa-ai"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]
type = "service"

# ============ AI & Secrets Configuration ============
[vars]
AI_GATEWAY_ID = "ai-chat-api-gateway"
AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
SITE_NAME = "Fly Trip Visa"
CONTACT_PHONE = "+8801338354383"
SITE_URL = "https://flytripvisa.site"

# ============ Secrets (Set via wrangler secret) ============
# CF_AIG_TOKEN = "cfut_h89yuBOflnGxwXSIY6ZQzbaF2Et5VvpBrDbOdaJid7ad19ac"
# CF_ACCOUNT_ID = "b73b80fa62deef032d3c08248cf2f30b"
# KV_NAMESPACE_ID = "cc79304937ff4daa9d6debae85da8be9"

# ============ D1 Database Binding ============
[[d1_databases]]
binding = "DB"
database_name = "flytripvisadb"
database_id = "26c063fe-1868-44b1-9a8c-a68eecfa18e7"

# ============ KV Namespace Binding ============
[[kv_namespaces]]
binding = "SESSION_KV"
id = "cc79304937ff4daa9d6debae85da8be9"

# ============ Build Configuration ============
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts", "frontend/src/**/*.tsx"]

# ============ Observability ============
[observability]
enabled = true

# ============ Environment Variables ============
[env.production]
name = "flytrip-visa-ai-prod"
vars = { ENVIRONMENT = "production" }

[env.development]
name = "flytrip-visa-ai-dev"
vars = { ENVIRONMENT = "development" };
